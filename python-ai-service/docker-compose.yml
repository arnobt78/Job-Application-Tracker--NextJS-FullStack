services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ai-service:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    # Ollama running on host — use host-gateway so container can reach it
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ARQ worker — consumes pipeline tasks from Redis queue
  arq-worker:
    build: .
    command: arq app.tasks.pipeline_task.WorkerSettings
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  redis_data:
